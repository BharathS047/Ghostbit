<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#0d1f35"/>
  <!-- Subtle grid bg -->
  <rect width="320" height="200" fill="url(#g1)" opacity="0.4"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>
  <!-- Board lines -->
  <line x1="120" y1="40" x2="120" y2="160" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="40" x2="200" y2="160" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="80" x2="240" y2="80" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="120" x2="240" y2="120" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- X top-left -->
  <line x1="95" y1="50" x2="113" y2="68" stroke="#93c5fd" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="113" y1="50" x2="95" y2="68" stroke="#93c5fd" stroke-width="3.5" stroke-linecap="round"/>
  <!-- O top-center -->
  <circle cx="160" cy="59" r="12" fill="none" stroke="#f87171" stroke-width="3.5"/>
  <!-- X top-right -->
  <line x1="215" y1="50" x2="233" y2="68" stroke="#93c5fd" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="233" y1="50" x2="215" y2="68" stroke="#93c5fd" stroke-width="3.5" stroke-linecap="round"/>
  <!-- O mid-left -->
  <circle cx="100" cy="100" r="12" fill="none" stroke="#f87171" stroke-width="3.5"/>
  <!-- X mid-center (winning) -->
  <line x1="147" y1="90" x2="173" y2="110" stroke="#93c5fd" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="173" y1="90" x2="147" y2="110" stroke="#93c5fd" stroke-width="3.5" stroke-linecap="round"/>
  <!-- O mid-right -->
  <circle cx="220" cy="100" r="12" fill="none" stroke="#f87171" stroke-width="3.5"/>
  <!-- X bottom-left -->
  <line x1="95" y1="130" x2="113" y2="148" stroke="#93c5fd" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="113" y1="130" x2="95" y2="148" stroke="#93c5fd" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Win line diagonal -->
  <line x1="95" y1="59" x2="220" y2="140" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
</svg>
