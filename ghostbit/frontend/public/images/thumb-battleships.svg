<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#040f17"/>
  <defs>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#040f17"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#g5)" opacity="0.7"/>
  <!-- Grid -->
  <g stroke="#155e75" stroke-width="1" opacity="0.6">
    <line x1="50" y1="25" x2="50" y2="175"/>
    <line x1="90" y1="25" x2="90" y2="175"/>
    <line x1="130" y1="25" x2="130" y2="175"/>
    <line x1="170" y1="25" x2="170" y2="175"/>
    <line x1="210" y1="25" x2="210" y2="175"/>
    <line x1="250" y1="25" x2="250" y2="175"/>
    <line x1="10" y1="65" x2="290" y2="65"/>
    <line x1="10" y1="105" x2="290" y2="105"/>
    <line x1="10" y1="145" x2="290" y2="145"/>
  </g>
  <!-- Ship 1 (horizontal, 3 cells) -->
  <rect x="53" y="28" width="116" height="34" rx="5" fill="#0e7490" opacity="0.8" stroke="#22d3ee" stroke-width="1"/>
  <!-- Ship 2 (vertical, 2 cells) -->
  <rect x="213" y="28" width="34" height="74" rx="5" fill="#0e7490" opacity="0.8" stroke="#22d3ee" stroke-width="1"/>
  <!-- Hit marker (X) -->
  <line x1="58" y1="112" x2="82" y2="136" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="112" x2="58" y2="136" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
  <!-- Hit marker 2 -->
  <line x1="178" y1="72" x2="202" y2="96" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
  <line x1="202" y1="72" x2="178" y2="96" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
  <!-- Miss marker (dot) -->
  <circle cx="150" cy="124" r="5" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.6"/>
  <circle cx="70" cy="84" r="5" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.6"/>
  <!-- Explosion effect on hit -->
  <circle cx="70" cy="124" r="14" fill="#f87171" opacity="0.15"/>
  <circle cx="190" cy="84" r="14" fill="#f87171" opacity="0.15"/>
  <!-- Grid labels -->
  <text x="30" y="50" font-family="monospace" font-size="11" fill="#67e8f9" opacity="0.5">A</text>
  <text x="30" y="90" font-family="monospace" font-size="11" fill="#67e8f9" opacity="0.5">B</text>
  <text x="30" y="130" font-family="monospace" font-size="11" fill="#67e8f9" opacity="0.5">C</text>
  <text x="30" y="170" font-family="monospace" font-size="11" fill="#67e8f9" opacity="0.5">D</text>
</svg>
