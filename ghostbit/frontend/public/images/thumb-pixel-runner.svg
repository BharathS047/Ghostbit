<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#1c0f00"/>
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#713f12"/>
      <stop offset="100%" stop-color="#1c0f00"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#g4)" opacity="0.6"/>
  <!-- Ground -->
  <rect x="0" y="155" width="320" height="6" rx="2" fill="#92400e" opacity="0.8"/>
  <!-- Dashed speed lines -->
  <line x1="20" y1="100" x2="60" y2="100" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.3"/>
  <line x1="20" y1="115" x2="80" y2="115" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="12,8" opacity="0.2"/>
  <line x1="20" y1="88" x2="50" y2="88" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.2"/>
  <!-- Runner (pixel art style) -->
  <!-- Head -->
  <rect x="148" y="88" width="24" height="22" rx="4" fill="#fbbf24"/>
  <!-- Body -->
  <rect x="146" y="110" width="28" height="24" rx="3" fill="#f59e0b"/>
  <!-- Running legs -->
  <rect x="146" y="132" width="10" height="22" rx="3" fill="#d97706" transform="rotate(-15 151 143)"/>
  <rect x="164" y="134" width="10" height="18" rx="3" fill="#d97706" transform="rotate(15 169 143)"/>
  <!-- Arm back -->
  <rect x="133" y="112" width="16" height="8" rx="4" fill="#f59e0b" transform="rotate(30 141 116)"/>
  <!-- Arm forward -->
  <rect x="170" y="108" width="18" height="8" rx="4" fill="#f59e0b" transform="rotate(-20 179 112)"/>
  <!-- Eye -->
  <circle cx="165" cy="97" r="3" fill="#1c0f00"/>
  <!-- Obstacles -->
  <rect x="240" y="125" width="18" height="30" rx="3" fill="#92400e"/>
  <rect x="236" y="120" width="26" height="8" rx="3" fill="#b45309"/>
  <rect x="280" y="130" width="14" height="25" rx="3" fill="#92400e"/>
  <!-- Score display -->
  <rect x="16" y="16" width="80" height="26" rx="6" fill="rgba(0,0,0,0.4)"/>
  <text x="56" y="34" text-anchor="middle" font-family="monospace" font-size="13" fill="#fbbf24" font-weight="bold">SCORE: 042</text>
</svg>
