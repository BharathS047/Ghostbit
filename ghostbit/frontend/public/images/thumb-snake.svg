<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#0a1f12"/>
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#g2)" opacity="0.5"/>
  <!-- Grid dots -->
  <g opacity="0.12" fill="#4ade80">
    <circle cx="40" cy="40" r="1.5"/> <circle cx="80" cy="40" r="1.5"/> <circle cx="120" cy="40" r="1.5"/>
    <circle cx="160" cy="40" r="1.5"/> <circle cx="200" cy="40" r="1.5"/> <circle cx="240" cy="40" r="1.5"/> <circle cx="280" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/> <circle cx="80" cy="80" r="1.5"/> <circle cx="120" cy="80" r="1.5"/>
    <circle cx="160" cy="80" r="1.5"/> <circle cx="200" cy="80" r="1.5"/> <circle cx="240" cy="80" r="1.5"/> <circle cx="280" cy="80" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/> <circle cx="80" cy="120" r="1.5"/> <circle cx="120" cy="120" r="1.5"/>
    <circle cx="160" cy="120" r="1.5"/> <circle cx="200" cy="120" r="1.5"/> <circle cx="240" cy="120" r="1.5"/> <circle cx="280" cy="120" r="1.5"/>
    <circle cx="40" cy="160" r="1.5"/> <circle cx="80" cy="160" r="1.5"/> <circle cx="120" cy="160" r="1.5"/>
    <circle cx="160" cy="160" r="1.5"/> <circle cx="200" cy="160" r="1.5"/> <circle cx="240" cy="160" r="1.5"/> <circle cx="280" cy="160" r="1.5"/>
  </g>
  <!-- Snake body segments (head right, body curves) -->
  <!-- Head -->
  <rect x="222" y="94" width="36" height="28" rx="8" fill="#4ade80"/>
  <!-- Neck -->
  <rect x="186" y="94" width="42" height="28" rx="4" fill="#22c55e"/>
  <!-- Segment 1 -->
  <rect x="150" y="94" width="42" height="28" rx="4" fill="#16a34a"/>
  <!-- Segment 2 -->
  <rect x="114" y="94" width="42" height="28" rx="4" fill="#15803d"/>
  <!-- Turn down -->
  <rect x="114" y="118" width="42" height="44" rx="4" fill="#15803d"/>
  <!-- Segment 3 -->
  <rect x="114" y="152" width="120" height="28" rx="4" fill="#166534"/>
  <!-- Tail -->
  <rect x="230" y="152" width="36" height="28" rx="4" fill="#14532d"/>
  <!-- Eye -->
  <circle cx="249" cy="105" r="4" fill="#0a1f12"/>
  <circle cx="251" cy="103" r="1.5" fill="#fff" opacity="0.8"/>
  <!-- Tongue -->
  <line x1="258" y1="108" x2="270" y2="106" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
  <line x1="270" y1="106" x2="276" y2="102" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
  <line x1="270" y1="106" x2="276" y2="110" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
  <!-- Food -->
  <circle cx="80" cy="60" r="10" fill="#f87171" opacity="0.9"/>
  <circle cx="83" cy="57" r="3" fill="#fca5a5" opacity="0.6"/>
</svg>
